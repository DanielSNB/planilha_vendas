<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Comparador Inteligente de Marcas e Lojas</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{
  font-family:Arial;
  background:#eef1f5;
  padding:20px;
}

.container{
  background:white;
  padding:25px;
  border-radius:10px;
  max-width:1200px;
  margin:auto;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input,button{
  padding:8px;
  margin:5px;
}

.cards{
  display:flex;
  gap:10px;
  margin-top:15px;
  flex-wrap:wrap;
}

.card{
  flex:1;
  padding:15px;
  border-radius:8px;
  color:white;
  font-weight:bold;
  text-align:center;
  min-width:180px;
}

.azul{background:#2196f3}
.verde{background:#4caf50}
.roxo{background:#673ab7}
.laranja{background:#ff9800}

.vermelho{background:#e53935;color:white}
.amarelo{background:#fdd835;color:black}
.verdeEscuro{background:#1b5e20;color:white}

.lista{
  margin-top:20px;
  background:#f7f7f7;
  padding:10px;
  border-radius:8px;
  max-height:300px;
  overflow:auto;
}

.item{
  padding:6px;
  border-bottom:1px solid #ddd;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:30px;
}

th,td{
  padding:10px;
  border:1px solid #ccc;
  text-align:center;
}

th{
  background:#1976d2;
  color:white;
}

</style>
</head>

<body>

<div class="container">

<h2>📊 Comparador Inteligente de Marcas e Lojas</h2>

<input type="file" id="file1"> Semana passada
<input type="file" id="file2"> Semana atual

<br><br>

Digite as marcas separadas por vírgula

<br>

<input type="text" id="marcas" placeholder="ex: nd, fresh care, selection" size="50">

<button onclick="comparar()">Buscar</button>

<div class="cards">

<div class="card azul" id="totalAntigo">
Semana passada
</div>

<div class="card verde" id="totalAtual">
Semana atual
</div>

<div class="card roxo" id="crescimento">
Crescimento
</div>

<div class="card laranja" id="diferenca">
Diferença %
</div>

</div>

<h3>Produtos encontrados (revise e desmarque se necessário)</h3>

<div class="lista" id="listaProdutos"></div>

<button onclick="recalcular()">Recalcular</button>

<h3>📋 Crescimento por Loja</h3>

<table id="tabelaLojas">

<thead>
<tr>
<th>Loja</th>
<th>Semana Passada</th>
<th>Semana Atual</th>
<th>Crescimento %</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

let listaAnterior=[]
let listaAtual=[]
let lojasAnterior={}
let lojasAtual={}

function ler(file,callback){

let reader=new FileReader()

reader.onload=e=>{

let data=new Uint8Array(e.target.result)
let wb=XLSX.read(data,{type:'array'})
let sheet=wb.Sheets[wb.SheetNames[0]]
let json=XLSX.utils.sheet_to_json(sheet)

callback(json)

}

reader.readAsArrayBuffer(file)

}

function pegarLoja(p){
  return p.Loja || p.loja || p.Store || "Sem Loja"
}

function pegarProduto(p){
  return p.Produto || p.produto || ""
}

function pegarQuantidade(p){
  return Number(p.Quantidade || p.Qtd || 1)
}

function pegarValor(p){
  return Number(
    p["Valor Unitário (R$)"] ||
    p["Valor Unitario"] ||
    p.Valor ||
    p.Venda ||
    p.Total ||
    0
  )
}

function comparar(){

let marcasInput=document.getElementById("marcas").value.toLowerCase()
let marcas=marcasInput.split(",").map(m=>m.trim()).filter(m=>m!="")

let f1=document.getElementById("file1").files[0]
let f2=document.getElementById("file2").files[0]

if(!f1 || !f2){
alert("Selecione os dois arquivos")
return
}

listaAnterior=[]
listaAtual=[]
lojasAnterior={}
lojasAtual={}

ler(f1,dados=>{

dados.forEach(p=>{

let produto=String(pegarProduto(p)).toLowerCase()
let loja=pegarLoja(p)

let encontrou=marcas.length==0 || marcas.some(m=>produto.includes(m))

if(encontrou){

let qtd=pegarQuantidade(p)
let valor=pegarValor(p)

let venda=qtd*valor

listaAnterior.push({
nome:produto,
loja:loja,
valor:venda
})

if(!lojasAnterior[loja]) lojasAnterior[loja]=0
lojasAnterior[loja]+=venda

}

})

ler(f2,dados2=>{

dados2.forEach(p=>{

let produto=String(pegarProduto(p)).toLowerCase()
let loja=pegarLoja(p)

let encontrou=marcas.length==0 || marcas.some(m=>produto.includes(m))

if(encontrou){

let qtd=pegarQuantidade(p)
let valor=pegarValor(p)

let venda=qtd*valor

listaAtual.push({
nome:produto,
loja:loja,
valor:venda
})

if(!lojasAtual[loja]) lojasAtual[loja]=0
lojasAtual[loja]+=venda

}

})

mostrarLista()
recalcular()

})

})

}

function mostrarLista(){

let html=""

listaAtual.forEach((p,i)=>{

html+=`
<div class="item">
<input type="checkbox" checked id="prod_${i}">
${p.nome} | ${p.loja} | R$ ${p.valor.toFixed(2)}
</div>
`

})

document.getElementById("listaProdutos").innerHTML=html

}

function corCrescimento(valor){

if(valor<=-20) return "vermelho"
if(valor<0) return "laranja"
if(valor==0) return "amarelo"
if(valor<=20) return "verde"
return "verdeEscuro"

}

function recalcular(){

let totalAtual=0
let lojasAtualCalc={}

listaAtual.forEach((p,i)=>{

let check=document.getElementById("prod_"+i)

if(check && check.checked){

totalAtual+=p.valor

if(!lojasAtualCalc[p.loja]) lojasAtualCalc[p.loja]=0
lojasAtualCalc[p.loja]+=p.valor

}

})

let totalAnterior=0

Object.values(lojasAnterior).forEach(v=>{
totalAnterior+=v
})

let crescimento = totalAnterior>0
? ((totalAtual-totalAnterior)/totalAnterior)*100
:0

let diferenca = totalAnterior>0
? (totalAtual/totalAnterior)*100
:0

document.getElementById("totalAntigo").innerHTML=
"Semana passada<br>R$ "+totalAnterior.toFixed(2)

document.getElementById("totalAtual").innerHTML=
"Semana atual<br>R$ "+totalAtual.toFixed(2)

let card=document.getElementById("crescimento")

card.className="card "+corCrescimento(Math.round(crescimento))

card.innerHTML=
"Crescimento<br>"+crescimento.toFixed(1)+"%"

document.getElementById("diferenca").innerHTML=
"Atual vs Passado<br>"+diferenca.toFixed(1)+"%"

gerarTabela(lojasAnterior,lojasAtualCalc)

}

function gerarTabela(lojasAnt,lojasAtu){

let todas=new Set([...Object.keys(lojasAnt),...Object.keys(lojasAtu)])

let html=""

todas.forEach(loja=>{

let v1=lojasAnt[loja]||0
let v2=lojasAtu[loja]||0

let crescimento=v1>0?((v2-v1)/v1)*100:0

html+=`
<tr class="${corCrescimento(Math.round(crescimento))}">
<td>${loja}</td>
<td>R$ ${v1.toFixed(2)}</td>
<td>R$ ${v2.toFixed(2)}</td>
<td>${crescimento.toFixed(1)}%</td>
</tr>
`

})

document.querySelector("#tabelaLojas tbody").innerHTML=html

}

</script>

</body>
</html>
```
