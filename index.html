<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Comparador Inteligente de Marcas</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;background:#eef1f5;padding:20px;}
.container{background:white;padding:25px;border-radius:10px;max-width:1200px;margin:auto;box-shadow:0 0 10px rgba(0,0,0,0.2);}
input,button{padding:8px;margin:5px;}
.cards{display:flex;gap:10px;margin-top:15px;flex-wrap:wrap;}
.card{flex:1;padding:15px;border-radius:8px;color:white;font-weight:bold;text-align:center;min-width:180px;}
.azul{background:#2196f3}
.verde{background:#4caf50}
.roxo{background:#673ab7}
.laranja{background:#ff9800}
.vermelho{background:#e53935}
.amarelo{background:#fdd835;color:black}
.verdeEscuro{background:#1b5e20}
.lista{margin-top:20px;background:#f7f7f7;padding:10px;border-radius:8px;max-height:300px;overflow:auto;}
.item{padding:6px;border-bottom:1px solid #ddd;}
table{width:100%;border-collapse:collapse;margin-top:30px;}
th,td{padding:10px;border:1px solid #ccc;text-align:center;}
th{background:#1976d2;color:white;}
.tituloParcial{font-size:20px;font-weight:bold;text-align:center;background:#e3f2fd;letter-spacing:1px;}
</style>

</head>

<body>
<div class="container">

<h2>📊 Comparador Inteligente de Marcas</h2>

<input type="file" id="file1"> Semana passada <input type="file" id="file2"> Semana atual

<br><br>

<input type="text" id="marcas" placeholder="ex: nd ou marca propria" size="40">

Horário <input type="time" id="horario">

<button onclick="comparar()">Buscar</button>

<div class="cards">
<div class="card azul" id="totalAntigo">Semana passada</div>
<div class="card verde" id="totalAtual">Semana atual</div>
<div class="card roxo" id="crescimento">Crescimento</div>
<div class="card laranja" id="diferenca">Diferença %</div>
</div>

<h3>Produtos encontrados</h3>
<div class="lista" id="listaProdutos"></div>

<button onclick="recalcular()">Recalcular</button>

<h3>📋 Histórico</h3>

<table>
<thead>
<tr>
<th>Loja</th>
<th>Marca</th>
<th>Semana passada</th>
<th>Semana atual</th>
<th>Crescimento</th>
</tr>
</thead>
<tbody id="historicoBody"></tbody>
</table>

</div>

<script>

let listaAnterior=[]
let listaAtual=[]
let lojaAtual=""
let horarioAtual=""
let tituloAdicionado=false
let marcaModo=""

const MARCAS_PROPRIAS=[
"nutrifresh","fresh","petz","super secao","petix",
"selection","zee","spike","fuzz","cdsg",
"happy med","babypads"
]

function ler(file,callback){

let reader=new FileReader()

reader.onload=e=>{

let data=new Uint8Array(e.target.result)
let wb=XLSX.read(data,{type:'array'})
let sheet=wb.Sheets[wb.SheetNames[0]]

/* 🔥 COMEÇA LER NA LINHA DO CABEÇALHO REAL */
let json=XLSX.utils.sheet_to_json(sheet,{range:4})

callback(json)

}

reader.readAsArrayBuffer(file)

}

/* 🔥 FUNÇÃO TOTALMENTE CORRIGIDA */
function pegarLoja(p){

if(!p.Loja) return null

let loja=String(p.Loja).trim()

if(loja==="" || loja.toLowerCase().includes("total")) return null

return loja
}

function pegarProduto(p){
return p.Produto||""
}

function pegarQuantidade(p){
return Number(p.Quantidade||0)
}

function pegarValor(p){
return Number(p["Valor Total"]||0)
}

function marcaPropria(produto){
return MARCAS_PROPRIAS.some(m=>{
if(m==="zee") return produto.includes("zee")
let regex=new RegExp("\\b"+m+"\\b","i")
return regex.test(produto)
})
}

function comparar(){

horarioAtual=document.getElementById("horario").value
let marcaInput=document.getElementById("marcas").value.toLowerCase()

let f1=document.getElementById("file1").files[0]
let f2=document.getElementById("file2").files[0]

listaAnterior=[]
listaAtual=[]

marcaModo = marcaInput.includes("marca propria") ? "MARCA PROPRIA" : marcaInput

ler(f1,dados=>{

dados.forEach(p=>{

let loja=pegarLoja(p)
if(!loja) return

lojaAtual=loja

let produto=String(pegarProduto(p)).toLowerCase()

let encontrou = marcaModo==="MARCA PROPRIA"
? marcaPropria(produto)
: new RegExp("\\b"+marcaModo+"\\b","i").test(produto)

if(encontrou){

let venda=pegarQuantidade(p)*pegarValor(p)

listaAnterior.push({produto:produto,valor:venda})

}

})

ler(f2,dados2=>{

dados2.forEach(p=>{

let loja=pegarLoja(p)
if(!loja) return

let produto=String(pegarProduto(p)).toLowerCase()

let encontrou = marcaModo==="MARCA PROPRIA"
? marcaPropria(produto)
: new RegExp("\\b"+marcaModo+"\\b","i").test(produto)

if(encontrou){

let venda=pegarQuantidade(p)*pegarValor(p)

listaAtual.push({produto:produto,valor:venda})

}

})

mostrarLista()
recalcular(false)

})

})

}

function mostrarLista(){

let html=""

listaAtual.forEach((p,i)=>{

html+=`
<div class="item">
<input type="checkbox" checked id="prod_${i}">
${marcaModo} | ${p.produto} | R$ ${p.valor.toFixed(2)}
</div>
`

})

document.getElementById("listaProdutos").innerHTML=html
}

function corCrescimento(v){
if(v<=-20) return "vermelho"
if(v<0) return "laranja"
if(v==0) return "amarelo"
if(v<=20) return "verde"
return "verdeEscuro"
}

function recalcular(perguntar=true){

let totalAnterior=0
let totalAtual=0

listaAnterior.forEach(p=> totalAnterior+=p.valor)

listaAtual.forEach((p,i)=>{
let check=document.getElementById("prod_"+i)
if(check && check.checked) totalAtual+=p.valor
})

let crescimento=((totalAtual-totalAnterior)/totalAnterior)*100

document.getElementById("totalAntigo").innerHTML="Semana passada<br>R$ "+totalAnterior.toFixed(2)
document.getElementById("totalAtual").innerHTML="Semana atual<br>R$ "+totalAtual.toFixed(2)
document.getElementById("crescimento").innerHTML="Crescimento<br>"+crescimento.toFixed(1)+"%"
document.getElementById("diferenca").innerHTML="Atual vs Passado<br>"+((totalAtual/totalAnterior)*100).toFixed(1)+"%"

if(perguntar){
if(confirm("Salvar no histórico?")){

if(!tituloAdicionado){

document.getElementById("historicoBody").innerHTML+=`
<tr>
<td colspan="5" class="tituloParcial">
PARCIAL COPA — ${horarioAtual}
</td>
</tr>
`
tituloAdicionado=true
}

document.getElementById("historicoBody").innerHTML+=`
<tr class="${corCrescimento(Math.round(crescimento))}">
<td>${lojaAtual}</td>
<td>${marcaModo}</td>
<td>R$ ${totalAnterior.toFixed(2)}</td>
<td>R$ ${totalAtual.toFixed(2)}</td>
<td>${crescimento.toFixed(1)}%</td>
</tr>
`
}
}

}

</script>

</body>
</html>
