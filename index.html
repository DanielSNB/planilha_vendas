<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Comparador Inteligente de Marcas</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
background:#eef1f5;
padding:20px;
}

.container{
background:white;
padding:25px;
border-radius:10px;
max-width:1200px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input,button{
padding:8px;
margin:5px;
}

.cards{
display:flex;
gap:10px;
margin-top:15px;
flex-wrap:wrap;
}

.card{
flex:1;
padding:15px;
border-radius:8px;
color:white;
font-weight:bold;
text-align:center;
min-width:180px;
}

.azul{background:#2196f3}
.verde{background:#4caf50}
.roxo{background:#673ab7}
.laranja{background:#ff9800}

.vermelho{background:#e53935}
.amarelo{background:#fdd835;color:black}
.verdeEscuro{background:#1b5e20}

.lista{
margin-top:20px;
background:#f7f7f7;
padding:10px;
border-radius:8px;
max-height:300px;
overflow:auto;
}

.item{
padding:6px;
border-bottom:1px solid #ddd;
}

table{
width:100%;
border-collapse:collapse;
margin-top:30px;
}

th,td{
padding:10px;
border:1px solid #ccc;
text-align:center;
}

th{
background:#1976d2;
color:white;
}

.tituloParcial{
font-size:20px;
font-weight:bold;
text-align:center;
background:#e3f2fd;
letter-spacing:1px;
}

</style>
</head>

<body>

<div class="container">

<h2>📊 Comparador Inteligente de Marcas</h2>

<input type="file" id="file1"> Semana passada
<input type="file" id="file2"> Semana atual

<br><br>

<input type="text" id="marcas" placeholder="ex: nd, fresh care, selection" size="40">

Horário

<input type="time" id="horario">

<button onclick="comparar()">Buscar</button>

<div class="cards">

<div class="card azul" id="totalAntigo">
Semana passada
</div>

<div class="card verde" id="totalAtual">
Semana atual
</div>

<div class="card roxo" id="crescimento">
Crescimento
</div>

<div class="card laranja" id="diferenca">
Diferença %
</div>

</div>

<h3>Produtos encontrados</h3>

<div class="lista" id="listaProdutos"></div>

<button onclick="recalcular()">Recalcular</button>

<h3>📋 Histórico de Comparações</h3>

<table>

<thead>
<tr>
<th>Loja</th>
<th>Marca</th>
<th>Semana passada</th>
<th>Semana atual</th>
<th>Crescimento</th>
</tr>
</thead>

<tbody id="historicoBody"></tbody>

</table>

</div>

<script>

let listaAnterior=[]
let listaAtual=[]
let lojaAtual=""
let tituloAdicionado=false
let marcaAtual=""
let horarioAtual=""

function ler(file,callback){

let reader=new FileReader()

reader.onload=e=>{

let data=new Uint8Array(e.target.result)
let wb=XLSX.read(data,{type:'array'})
let sheet=wb.Sheets[wb.SheetNames[0]]
let json=XLSX.utils.sheet_to_json(sheet)

callback(json)

}

reader.readAsArrayBuffer(file)

}

function pegarLoja(p){

let loja = p.Loja || p.loja || p.Store || Object.values(p)[0] || ""

if(!loja) return null

loja = String(loja)

if(loja.toLowerCase().includes("total")) return null

return loja

}

function pegarProduto(p){
return p.Produto || p.produto || Object.values(p)[1] || ""
}

function pegarQuantidade(p){
return Number(p.Quantidade || p.Qtd || Object.values(p)[2] || 1)
}

function pegarValor(p){
return Number(
p["Valor Total"] ||
p["Valor Unitário (R$)"] ||
p.Valor ||
p.Venda ||
p.Total ||
Object.values(p)[3] ||
0
)
}

function comparar(){

marcaAtual=document.getElementById("marcas").value
horarioAtual=document.getElementById("horario").value

let marcas=marcaAtual.toLowerCase().split(",").map(m=>m.trim())

let f1=document.getElementById("file1").files[0]
let f2=document.getElementById("file2").files[0]

listaAnterior=[]
listaAtual=[]

ler(f1,dados=>{

dados.forEach(p=>{

let loja=pegarLoja(p)
if(!loja) return

let produto=String(pegarProduto(p)).toLowerCase()

lojaAtual=loja

let encontrou=marcas.some(m=>produto.includes(m))

if(encontrou){

let venda=pegarQuantidade(p)*pegarValor(p)

listaAnterior.push({
nome:produto,
loja:loja,
valor:venda
})

}

})

ler(f2,dados2=>{

dados2.forEach(p=>{

let loja=pegarLoja(p)
if(!loja) return

let produto=String(pegarProduto(p)).toLowerCase()

let encontrou=marcas.some(m=>produto.includes(m))

if(encontrou){

let venda=pegarQuantidade(p)*pegarValor(p)

listaAtual.push({
nome:produto,
loja:loja,
valor:venda
})

}

})

mostrarLista()
recalcular(false)

})

})

}

function mostrarLista(){

let html=""

listaAtual.forEach((p,i)=>{

html+=`
<div class="item">
<input type="checkbox" checked id="prod_${i}">
${p.nome} | ${p.loja} | R$ ${p.valor.toFixed(2)}
</div>
`

})

document.getElementById("listaProdutos").innerHTML=html

}

function corCrescimento(valor){

if(valor<=-20) return "vermelho"
if(valor<0) return "laranja"
if(valor==0) return "amarelo"
if(valor<=20) return "verde"
return "verdeEscuro"

}

function recalcular(perguntar=true){

let totalAtual=0
let totalAnterior=0

listaAnterior.forEach(p=>{
totalAnterior+=p.valor
})

listaAtual.forEach((p,i)=>{

let check=document.getElementById("prod_"+i)

if(check && check.checked){
totalAtual+=p.valor
}

})

let crescimento=((totalAtual-totalAnterior)/totalAnterior)*100

document.getElementById("totalAntigo").innerHTML=
"Semana passada<br>R$ "+totalAnterior.toFixed(2)

document.getElementById("totalAtual").innerHTML=
"Semana atual<br>R$ "+totalAtual.toFixed(2)

let card=document.getElementById("crescimento")

card.className="card "+corCrescimento(Math.round(crescimento))

card.innerHTML=
"Crescimento<br>"+crescimento.toFixed(1)+"%"

document.getElementById("diferenca").innerHTML=
"Atual vs Passado<br>"+((totalAtual/totalAnterior)*100).toFixed(1)+"%"

if(perguntar){

if(confirm("Deseja salvar essa comparação no histórico?")){
salvarHistorico(totalAnterior,totalAtual,crescimento)
}

}

}

function salvarHistorico(vAnterior,vAtual,crescimento){

let html=""

if(!tituloAdicionado){

html+=`
<tr>
<td colspan="5" class="tituloParcial">
PARCIAL COPA — ${horarioAtual}
</td>
</tr>
`

tituloAdicionado=true

}

html+=`
<tr class="${corCrescimento(Math.round(crescimento))}">
<td>${lojaAtual}</td>
<td>${marcaAtual}</td>
<td>R$ ${vAnterior.toFixed(2)}</td>
<td>R$ ${vAtual.toFixed(2)}</td>
<td>${crescimento.toFixed(1)}%</td>
</tr>
`

document.getElementById("historicoBody").innerHTML+=html

}

</script>

</body>
</html>
```
