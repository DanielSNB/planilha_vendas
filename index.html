<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Gerencial Inteligente PRO</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

body{font-family:Arial;background:#eef1f5;padding:20px}

.container{
background:white;
padding:25px;
border-radius:10px;
max-width:1700px;
margin:auto;
box-shadow:0 0 15px rgba(0,0,0,0.2)
}

input,select,button{
padding:8px;
margin:5px
}

table{
border-collapse:collapse;
width:100%;
margin-top:15px
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:center;
font-size:13px
}

th{
background:#1976d2;
color:white
}

.vermelho{background:#e53935;color:white}
.verde{background:#43a047;color:white}
.amarelo{background:#fdd835}

.titulo{
font-size:22px;
font-weight:bold;
margin-top:25px
}

.listaBox{
max-height:220px;
overflow:auto;
background:#f7f7f7;
padding:10px;
border-radius:8px;
margin-top:10px
}

.parcialBox{
margin-top:20px;
border:2px solid black;
background:white;
display:inline-block
}

.parcialTitulo{
background:yellow;
font-weight:bold;
text-align:center;
padding:6px;
font-size:16px
}

</style>
</head>

<body>

<div class="container">

<h2>📊 Sistema Gerencial Inteligente PRO</h2>

Modo
<select id="modo">
<option value="dia">Dia semana</option>
<option value="hora">Por horário</option>
</select>

Dia
<select id="dia">
<option>Segunda</option>
<option>Terça</option>
<option>Quarta</option>
<option>Quinta</option>
<option>Sexta</option>
<option>Sábado</option>
<option>Domingo</option>
</select>

Horário <input type="time" id="hora">

Marca <input type="text" id="marca">

<br>

<input type="file" id="passado"> Semana passada
<input type="file" id="atual"> Semana atual

<br>

<button onclick="processar()">Processar marca</button>
<button onclick="confirmarProdutos()">Confirmar produtos</button>
<button onclick="limparTudo()">Limpar tudo</button>
<button onclick="gerarParcial()">Gerar parcial</button>
<button onclick="exportarImagem()">Exportar parcial imagem</button>

<h3>Selecionar produtos encontrados</h3>
<div id="listaProdutos" class="listaBox"></div>

<canvas id="grafico"></canvas>

<div class="titulo">Lista semanal</div>

<table>
<thead>
<tr>
<th>Dia</th>
<th>Loja</th>
<th>Marca</th>
<th>Semana passada</th>
<th>Semana atual</th>
<th>Crescimento</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="lista"></tbody>
</table>

<div class="titulo">Ranking lojas</div>

<table>
<thead>
<tr>
<th>Pos</th>
<th>Loja</th>
<th>Crescimento médio</th>
</tr>
</thead>

<tbody id="ranking"></tbody>
</table>

<div class="titulo">Parcial Gerencial</div>

<div class="parcialBox" id="printArea">

<div class="parcialTitulo">PARCIAL SEMANA</div>

<table id="tabelaParcial"></table>

</div>

</div>

<script>

let dados = JSON.parse(localStorage.getItem("dadosMarca") || "[]")

let chart

let produtosTemp=[]
let lojaTemp=""
let marcaTemp=""
let modoTemp=""
let diaTemp=""
let horaTemp=""

function salvar(){
localStorage.setItem("dadosMarca",JSON.stringify(dados))
}

function limparTudo(){
if(confirm("Apagar tudo?")){
dados=[]
salvar()
render()
}
}

function excluirIndex(i){
dados.splice(i,1)
salvar()
render()
}

function ler(file){
return new Promise(res=>{
let reader=new FileReader()
reader.onload=e=>{
let data=new Uint8Array(e.target.result)
let wb=XLSX.read(data,{type:'array'})
let sheet=wb.Sheets[wb.SheetNames[0]]
let json=XLSX.utils.sheet_to_json(sheet,{range:4})
res(json)
}
reader.readAsArrayBuffer(file)
})
}

function buscaInteligente(produto,busca){
produto=(produto||"").toUpperCase()
busca=(busca||"").toUpperCase()

produto=produto.normalize("NFD").replace(/[\u0300-\u036f]/g,"")
busca=busca.normalize("NFD").replace(/[\u0300-\u036f]/g,"")

let regex=new RegExp("\\b"+busca+"S?\\b","i")

return regex.test(produto)
}

async function processar(){

if(!passado.files[0] || !atual.files[0]){
alert("Importe os dois arquivos")
return
}

marcaTemp=document.getElementById("marca").value.toUpperCase()

modoTemp=document.getElementById("modo").value
diaTemp=document.getElementById("dia").value
horaTemp=document.getElementById("hora").value

let a=await ler(passado.files[0])
let b=await ler(atual.files[0])

produtosTemp=[]

let palavras=[]

if(marcaTemp=="MSD"){
palavras=["BRAVECTO","AZIUM","CEFA-CURE","DEFENZA","FLOTRIL","INCURIN","METICORTEN","OTOMAX","PANACUR","POSATEX","PULVEX","SCALIBOR","TRIATOX"]
}

else if(marcaTemp=="FARMINA"){
palavras=["ND","VETLIFE","MATISSE"]
}

else if(marcaTemp=="ZOETIS"){
palavras=["SIMPARIC","APOQUEL","CONVENIA","CYTOPOINT","DRAXXIN","REVOLUTION"]
}

else if(marcaTemp=="ELANCO"){
palavras=["CREDELI","GALLIPRANT","ADVANTIX","ADVOCATE"]
}

else if(marcaTemp=="OUROFINO"){
palavras=["COLOSSO","TOPLINE","MASTER"]
}

else if(marcaTemp=="VIRBAC"){
palavras=["EFFIPRO","CETRIVET","NUTRIBOUND"]
}

else{
palavras=[marcaTemp]
}

a.forEach(p=>{

let nome=(p.Produto||"")

if(!lojaTemp && p.Loja) lojaTemp=p.Loja

let encontrou=false

palavras.forEach(pal=>{
if(buscaInteligente(nome,pal)) encontrou=true
})

if(encontrou){
produtosTemp.push({
nome:nome,
vA:Number(p["Valor Total"]||0),
vB:0
})
}

})

b.forEach(p=>{

let nome=(p.Produto||"")

let item=produtosTemp.find(x=>x.nome==nome)

if(item){
item.vB+=Number(p["Valor Total"]||0)
}

})

mostrarListaProdutos()

}

function mostrarListaProdutos(){

let html=""

produtosTemp.forEach((p,i)=>{

html+=`
<div>
<input type="checkbox" checked id="prod_${i}">
${p.nome} | Ant: R$ ${p.vA.toFixed(2)} | Atual: R$ ${p.vB.toFixed(2)}
</div>
`

})

listaProdutos.innerHTML=html

}

function confirmarProdutos(){

let vendaA=0
let vendaB=0

produtosTemp.forEach((p,i)=>{

let c=document.getElementById("prod_"+i)

if(c && c.checked){
vendaA+=p.vA
vendaB+=p.vB
}

})

if(vendaA==0 && vendaB==0){
alert("Nenhum produto selecionado")
return
}

let cresc = vendaA ? ((vendaB-vendaA)/vendaA)*100 : 0

dados.push({
modo:modoTemp,
dia:diaTemp,
hora:horaTemp,
loja:lojaTemp,
marca:marcaTemp,
vendaA,
vendaB,
cresc
})

salvar()
render()

alert("Marca salva corretamente")

}

function cor(v){
if(v<0)return"vermelho"
if(v==0)return"amarelo"
return"verde"
}

function render(){

let html=""

dados.forEach((d,i)=>{

html+=`
<tr>
<td>${d.dia}</td>
<td>${d.loja}</td>
<td>${d.marca}</td>
<td>R$ ${d.vendaA.toFixed(2)}</td>
<td>R$ ${d.vendaB.toFixed(2)}</td>
<td class="${cor(Math.round(d.cresc))}">${d.cresc.toFixed(1)}%</td>
<td><button onclick="excluirIndex(${i})">Excluir</button></td>
</tr>
`

})

lista.innerHTML=html

rankingFunc()
graficoFunc()

}

function rankingFunc(){

let mapa={}

dados.forEach(d=>{

if(!mapa[d.loja]) mapa[d.loja]={s:0,q:0}

mapa[d.loja].s+=d.cresc
mapa[d.loja].q++

})

let arr=[]

for(let l in mapa){
arr.push({
loja:l,
media:mapa[l].s/mapa[l].q
})
}

arr.sort((a,b)=>b.media-a.media)

let html=""

arr.forEach((r,i)=>{

html+=`
<tr>
<td>${i+1}</td>
<td>${r.loja}</td>
<td class="${cor(Math.round(r.media))}">
${r.media.toFixed(1)}%
</td>
</tr>
`

})

ranking.innerHTML=html

}

function graficoFunc(){

let labels=dados.map(d=>d.marca)

let a=dados.map(d=>d.vendaA)
let b=dados.map(d=>d.vendaB)

if(chart) chart.destroy()

chart=new Chart(grafico,{
type:"bar",
data:{
labels,
datasets:[
{label:"Semana passada",data:a},
{label:"Semana atual",data:b}
]
}
})

}

function gerarParcial(){

let lojas=[...new Set(dados.map(d=>d.loja))]
let marcas=[...new Set(dados.map(d=>d.marca))]

let html="<tr><th>Loja</th>"

marcas.forEach(m=>{
html+=`<th>${m}</th>`
})

html+="</tr>"

lojas.forEach(loja=>{

html+=`<tr><td>${loja}</td>`

marcas.forEach(m=>{

let total=0

dados.forEach(d=>{
if(d.loja==loja && d.marca==m){
total+=d.vendaB
}
})

html+=`<td>${total? "R$ "+total.toFixed(2):"-"}</td>`

})

html+="</tr>"

})

tabelaParcial.innerHTML=html

}

function exportarImagem(){

html2canvas(document.getElementById("printArea"),{scale:3})
.then(canvas=>{

let link=document.createElement("a")

link.download="parcial_semana.png"
link.href=canvas.toDataURL()
link.click()

})

}

render()

</script>

</body>
</html>
