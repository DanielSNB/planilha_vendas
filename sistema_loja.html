<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema de Vendas PRO</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family: Arial;
background:#eef1f5;
padding:20px;
}

.container{
background:white;
padding:25px;
border-radius:14px;
max-width:1100px;
margin:auto;
box-shadow:0 0 20px rgba(0,0,0,0.15);
}

h2{
margin-top:0;
}

input,button{
padding:8px;
margin:5px;
}

.cards{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-top:15px;
}

.card{
flex:1;
min-width:200px;
padding:15px;
border-radius:10px;
color:white;
font-weight:bold;
}

.azul{background:#2196f3}
.verde{background:#4caf50}
.roxo{background:#673ab7}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#f4f4f4;
}

</style>
</head>
<body>

<div class="container">

<h2>📊 Sistema Inteligente de Vendas</h2>

<input type="file" id="file1"> Período anterior  
<input type="file" id="file2"> Período atual  

<br>

Meta mensal R$
<input type="number" id="meta" value="10000">

<button onclick="comparar()">Analisar</button>

<div class="cards">

<div class="card azul" id="totalAntigo">Total anterior</div>
<div class="card verde" id="totalAtual">Total atual</div>
<div class="card roxo" id="crescimentoLoja">Crescimento loja</div>

</div>

<table id="tabela">
<thead>
<tr>
<th>Produto</th>
<th>Anterior</th>
<th>Atual</th>
<th>Crescimento %</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h3>🏆 Ranking mais vendidos</h3>
<div id="ranking"></div>

<canvas id="grafico" style="margin-top:30px"></canvas>

</div>

<script>

let s1={}, s2={}
let chart

function ler(file, cb){

let reader=new FileReader()

reader.onload=e=>{
let data=new Uint8Array(e.target.result)
let wb=XLSX.read(data,{type:'array'})
let sheet=wb.Sheets[wb.SheetNames[0]]
let json=XLSX.utils.sheet_to_json(sheet)
cb(json)
}

reader.readAsArrayBuffer(file)

}

function cor(p){

if(p<=-50) return "#f44336"
if(p<0) return "#ff9800"
if(p==0) return "#ffd600"
if(p<=50) return "#8bc34a"
return "#2e7d32"

}

function comparar(){

s1={}
s2={}

ler(file1.files[0],d1=>{

d1.forEach(p=> s1[p.Produto]=Number(p.Total))

ler(file2.files[0],d2=>{

d2.forEach(p=> s2[p.Produto]=Number(p.Total))

mostrar()

})

})

}

function mostrar(){

let tbody=document.querySelector("#tabela tbody")
tbody.innerHTML=""

let produtos=new Set([
...Object.keys(s1),
...Object.keys(s2)
])

let labels=[]
let dados=[]
let cores=[]
let total1=0
let total2=0
let ranking=[]

produtos.forEach(nome=>{

let v1=s1[nome]||0
let v2=s2[nome]||0

total1+=v1
total2+=v2

let cres=0
if(v1>0) cres=((v2-v1)/v1)*100

let c=cor(cres)

labels.push(nome)
dados.push(cres)
cores.push(c)

ranking.push({nome, valor:v2})

tbody.innerHTML+=`
<tr style="background:${c}33">
<td>${nome}</td>
<td>R$ ${v1}</td>
<td>R$ ${v2}</td>
<td>${cres.toFixed(1)}%</td>
</tr>
`

})

ranking.sort((a,b)=>b.valor-a.valor)

let html=""
ranking.slice(0,5).forEach(r=>{
html+=`<div>🥇 ${r.nome} → R$ ${r.valor}</div>`
})

document.getElementById("ranking").innerHTML=html

let cresLoja=((total2-total1)/total1)*100

totalAntigo.innerHTML="Total anterior<br>R$ "+total1
totalAtual.innerHTML="Total atual<br>R$ "+total2
crescimentoLoja.innerHTML="Crescimento<br>"+cresLoja.toFixed(1)+"%"

if(chart) chart.destroy()

chart=new Chart(grafico,{
type:'bar',
data:{
labels:labels,
datasets:[{
label:'Crescimento %',
data:dados,
backgroundColor:cores
}]
}
})

}

</script>

</body>
</html>
