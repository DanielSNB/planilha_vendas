```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Comparador Inteligente de Marcas</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#eef1f5;
padding:20px;
}

.container{
background:white;
padding:25px;
border-radius:10px;
max-width:1100px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input,button{
padding:8px;
margin:5px;
}

.cards{
display:flex;
gap:10px;
margin-top:15px;
flex-wrap:wrap;
}

.card{
flex:1;
padding:15px;
border-radius:8px;
color:white;
font-weight:bold;
text-align:center;
min-width:180px;
}

.azul{background:#2196f3}
.verde{background:#4caf50}
.roxo{background:#673ab7}
.laranja{background:#ff9800}

.vermelho{background:#e53935}
.amarelo{background:#fdd835;color:black}
.verdeEscuro{background:#1b5e20}

.lista{
margin-top:20px;
background:#f7f7f7;
padding:10px;
border-radius:8px;
max-height:300px;
overflow:auto;
}

.item{
padding:6px;
border-bottom:1px solid #ddd;
}

</style>
</head>

<body>

<div class="container">

<h2>📊 Comparador Inteligente de Marcas</h2>

<input type="file" id="file1"> Semana passada
<input type="file" id="file2"> Semana atual

<br><br>

Digite as marcas separadas por vírgula

<br>

<input type="text" id="marcas" placeholder="ex: nd, fresh care, selection" size="50">

<button onclick="comparar()">Buscar</button>

<div class="cards">

<div class="card azul" id="totalAntigo">
Semana passada
</div>

<div class="card verde" id="totalAtual">
Semana atual
</div>

<div class="card roxo" id="crescimento">
Crescimento
</div>

<div class="card laranja" id="diferenca">
Diferença %
</div>

</div>

<h3>Produtos encontrados (revise e desmarque se necessário)</h3>

<div class="lista" id="listaProdutos"></div>

<button onclick="recalcular()">Recalcular</button>

<canvas id="grafico" style="margin-top:30px"></canvas>

</div>

<script>

let listaAnterior=[]
let listaAtual=[]
let chart

function ler(file,callback){

let reader=new FileReader()

reader.onload=e=>{

let data=new Uint8Array(e.target.result)
let wb=XLSX.read(data,{type:'array'})
let sheet=wb.Sheets[wb.SheetNames[0]]
let json=XLSX.utils.sheet_to_json(sheet)

callback(json)

}

reader.readAsArrayBuffer(file)

}

function comparar(){

let marcasInput=document.getElementById("marcas").value.toLowerCase()
let marcas=marcasInput.split(",").map(m=>m.trim()).filter(m=>m!="")

let f1=document.getElementById("file1").files[0]
let f2=document.getElementById("file2").files[0]

if(!f1 || !f2){
alert("Selecione os dois arquivos")
return
}

if(marcas.length==0){
alert("Digite pelo menos uma marca")
return
}

listaAnterior=[]
listaAtual=[]

ler(f1,dados=>{

dados.forEach(p=>{

let produto=String(p.Produto || "").toLowerCase()
let encontrou=marcas.some(m=>produto.includes(m))

if(encontrou){

let qtd=Number(p.Quantidade) || 0
let valorUnit=Number(p["Valor Unitário (R$)"] || p["Valor Unitario"] || p.Valor) || 0

listaAnterior.push({
nome:p.Produto,
qtd:qtd,
valor:qtd*valorUnit
})

}

})

ler(f2,dados2=>{

dados2.forEach(p=>{

let produto=String(p.Produto || "").toLowerCase()
let encontrou=marcas.some(m=>produto.includes(m))

if(encontrou){

let qtd=Number(p.Quantidade) || 0
let valorUnit=Number(p["Valor Unitário (R$)"] || p["Valor Unitario"] || p.Valor) || 0

listaAtual.push({
nome:p.Produto,
qtd:qtd,
valor:qtd*valorUnit
})

}

})

mostrarLista()
recalcular()

})

})

}

function mostrarLista(){

let html=""

listaAtual.forEach((p,i)=>{

html+=`
<div class="item">
<input type="checkbox" checked id="prod_${i}">
${p.nome} | Qtd: ${p.qtd} | R$ ${p.valor.toFixed(2)}
</div>
`

})

document.getElementById("listaProdutos").innerHTML=html

}

function corCrescimento(valor){

if(valor <= -20) return "vermelho"
if(valor < 0) return "laranja"
if(valor == 0) return "amarelo"
if(valor <= 20) return "verde"
return "verdeEscuro"

}

function recalcular(){

let totalAtual=0

listaAtual.forEach((p,i)=>{

let check=document.getElementById("prod_"+i)

if(check && check.checked){
totalAtual+=p.valor
}

})

let totalAnterior=0

listaAnterior.forEach(p=>{
totalAnterior+=p.valor
})

let crescimento = totalAnterior>0
? ((totalAtual-totalAnterior)/totalAnterior)*100
:0

let diferenca = totalAnterior>0
? (totalAtual/totalAnterior)*100
:0

document.getElementById("totalAntigo").innerHTML=
"Semana passada<br>R$ "+totalAnterior.toFixed(2)

document.getElementById("totalAtual").innerHTML=
"Semana atual<br>R$ "+totalAtual.toFixed(2)

let cardCrescimento=document.getElementById("crescimento")

cardCrescimento.className="card "+corCrescimento(Math.round(crescimento))

let simbolo = crescimento>0 ? "📈 +" : crescimento<0 ? "📉 " : "➖ "

cardCrescimento.innerHTML=
"Crescimento<br>"+simbolo+crescimento.toFixed(1)+"%"

document.getElementById("diferenca").innerHTML=
"Atual vs Passado<br>"+diferenca.toFixed(1)+"%"

if(chart) chart.destroy()

chart=new Chart(document.getElementById("grafico"),{

type:'bar',

data:{
labels:["Semana passada","Semana atual"],
datasets:[{
label:"Vendas (R$)",
data:[totalAnterior,totalAtual]
}]
}

})

}

</script>

</body>
</html>
